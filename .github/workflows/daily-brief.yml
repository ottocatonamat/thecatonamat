# Daily AI-in-Finance brief: collect -> synthesize (Claude) -> render -> commit.
#
# Runs at 08:00 UTC daily. Change the cron line to shift the hour
# (e.g. "0 13 * * *" = 8am US Eastern during daylight time).
#
# NOTE: scheduled workflows only fire on the DEFAULT branch (master).
# The synthesis step needs the ANTHROPIC_API_KEY repo secret; without it the
# workflow still collects data and you can generate the brief from your phone
# with the /daily-brief command in Claude Code.

name: daily-brief

on:
  schedule:
    - cron: "0 8 * * *"
  workflow_dispatch: {}

concurrency:
  group: daily-brief
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  brief:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Collect news items
        run: python pipeline/collect.py

      - name: Synthesize daily brief with Claude
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python pipeline/synthesize.py

      - name: Render HTML
        run: python pipeline/render.py

      - name: Commit and push
        run: |
          git config user.name "ai-finance-brief bot"
          git config user.email "actions@users.noreply.github.com"
          git add data reports docs
          if git diff --cached --quiet; then
            echo "Nothing new to commit."
          else
            git commit -m "Daily brief $(date -u +%F)"
            git pull --rebase origin "${GITHUB_REF_NAME}" || true
            git push origin "HEAD:${GITHUB_REF_NAME}"
          fi
