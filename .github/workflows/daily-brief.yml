# Daily AI-in-Finance brief: collect -> synthesize (Claude) -> render -> commit.
#
# Scheduled for ~08:00 Singapore time (SGT = UTC+8, no DST). The cron fires at
# 23:47 UTC (= 07:47 SGT): midnight UTC is GitHub's most congested cron slot
# and jobs there queued 60-100 min late, so we start early off the hour and
# let the queue delay land the brief around 8am. The report is dated in SGT.
#
# NOTE: scheduled workflows only fire on the DEFAULT branch (master).
# The synthesis step needs the ANTHROPIC_API_KEY repo secret; without it the
# workflow still collects data and you can generate the brief from your phone
# with the /daily-brief command in Claude Code.

name: daily-brief

on:
  schedule:
    - cron: "47 23 * * *"
  workflow_dispatch: {}

concurrency:
  group: daily-brief
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  brief:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      # All steps share the SGT calendar date so the brief matches the
      # reader's morning even though the runner clock is UTC.
      - name: Set report date (SGT)
        id: date
        run: echo "sgt=$(TZ=Asia/Singapore date +%F)" >> "$GITHUB_OUTPUT"

      - name: Collect news items
        run: python pipeline/collect.py --date "${{ steps.date.outputs.sgt }}"

      - name: Synthesize daily brief with Claude
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python pipeline/synthesize.py --date "${{ steps.date.outputs.sgt }}"

      # Render and commit even if synthesis failed, so collected items are
      # never lost — a red run then means "no brief today", not "no data".
      - name: Render HTML
        if: ${{ !cancelled() }}
        run: python pipeline/render.py

      - name: Commit and push
        if: ${{ !cancelled() }}
        run: |
          git config user.name "ai-finance-brief bot"
          git config user.email "actions@users.noreply.github.com"
          git add data reports docs
          if git diff --cached --quiet; then
            echo "Nothing new to commit."
          else
            git commit -m "Daily brief ${{ steps.date.outputs.sgt }}"
            git pull --rebase origin "${GITHUB_REF_NAME}" || true
            git push origin "HEAD:${GITHUB_REF_NAME}"
          fi
