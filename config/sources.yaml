# Feed registry for the AI-in-Finance daily brief.
#
# Fields per source:
#   name:            human-readable label (also used as publisher fallback)
#   url:             RSS/Atom feed URL (Google News RSS and the arXiv API are both Atom)
#   category_hint:   default category if the synthesizer has nothing better
#   region_hint:     default region
#   assume_relevant: true  -> skip the AI+finance keyword filter (feed is already scoped)
#                    false -> item must match AI keywords AND finance keywords (topics.yaml)
#   weight:          1-3, higher = more likely to survive per-day item caps

sources:
  # ------------------------------------------------- commentary & analysis
  # Named finance/asset-management/econ voices who publish legitimate RSS
  # feeds (the ToS-safe alternative to scraping X). assume_relevant: false so
  # the AI+finance keyword filter keeps only on-topic posts out of general
  # commentary. Validated against a live run; dead feeds are skipped, not fatal.

  - name: Abnormal Returns
    url: https://abnormalreturns.com/feed/
    category_hint: asset_management
    region_hint: US
    assume_relevant: false
    weight: 2

  - name: The Big Picture (Barry Ritholtz)
    url: https://ritholtz.com/feed/
    category_hint: asset_management
    region_hint: US
    assume_relevant: false
    weight: 2

  - name: Net Interest (Marc Rubinstein)
    url: https://www.netinterest.co/feed
    category_hint: fintech
    region_hint: Global
    assume_relevant: false
    weight: 2

  - name: Klement on Investing
    url: https://klementoninvesting.substack.com/feed
    category_hint: asset_management
    region_hint: Global
    assume_relevant: false
    weight: 2

  - name: Musings on Markets (Aswath Damodaran)
    url: https://aswathdamodaran.blogspot.com/feeds/posts/default
    category_hint: markets
    region_hint: US
    assume_relevant: false
    weight: 1

  - name: Bank Underground (Bank of England)
    url: https://bankunderground.co.uk/feed/
    category_hint: regulation
    region_hint: UK
    assume_relevant: false
    weight: 2

  - name: a16z
    url: https://a16z.com/feed/
    category_hint: fintech
    region_hint: US
    assume_relevant: false
    weight: 1

  - name: Noahpinion (Noah Smith)
    url: https://www.noahpinion.blog/feed
    category_hint: markets
    region_hint: US
    assume_relevant: false
    weight: 1

  # ---------------------------------------------------------------- regulators
  - name: SEC Press Releases
    url: https://www.sec.gov/news/pressreleases.rss
    category_hint: regulation
    region_hint: US
    assume_relevant: false
    weight: 3

  - name: Federal Reserve Press Releases
    url: https://www.federalreserve.gov/feeds/press_all.xml
    category_hint: regulation
    region_hint: US
    assume_relevant: false
    weight: 3

  - name: UK FCA News
    url: https://www.fca.org.uk/news/rss.xml
    category_hint: regulation
    region_hint: UK
    assume_relevant: false
    weight: 3

  - name: ECB Press Releases
    url: https://www.ecb.europa.eu/rss/press.html
    category_hint: regulation
    region_hint: EU
    assume_relevant: false
    weight: 3

  - name: ESMA News
    url: https://www.esma.europa.eu/rss.xml
    category_hint: regulation
    region_hint: EU
    assume_relevant: false
    weight: 2

  # ---------------------------------------------------------------- research
  # arXiv API (Atom). Query: AI/LLM papers in quantitative finance + finance-flavored ML.
  - name: arXiv q-fin x AI
    url: "http://export.arxiv.org/api/query?search_query=cat:q-fin.*+AND+(abs:%22machine+learning%22+OR+abs:%22deep+learning%22+OR+abs:%22large+language+model%22+OR+abs:%22artificial+intelligence%22+OR+abs:LLM)&sortBy=submittedDate&sortOrder=descending&max_results=25"
    category_hint: research
    region_hint: Global
    assume_relevant: true
    weight: 2

  - name: arXiv cs.AI/cs.LG x finance
    url: "http://export.arxiv.org/api/query?search_query=(cat:cs.AI+OR+cat:cs.LG+OR+cat:cs.CL)+AND+(abs:finance+OR+abs:financial+OR+abs:trading+OR+abs:%22asset+management%22+OR+abs:banking)&sortBy=submittedDate&sortOrder=descending&max_results=25"
    category_hint: research
    region_hint: Global
    assume_relevant: true
    weight: 2

  # ---------------------------------------------------------------- trade media
  - name: Finextra
    url: https://www.finextra.com/rss/headlines.aspx
    category_hint: fintech
    region_hint: Global
    assume_relevant: false
    weight: 2

  - name: TechCrunch Fintech
    url: https://techcrunch.com/category/fintech/feed/
    category_hint: fintech
    region_hint: US
    assume_relevant: false
    weight: 2

  - name: VentureBeat AI
    url: https://venturebeat.com/category/ai/feed/
    category_hint: technology
    region_hint: US
    assume_relevant: false
    weight: 1

  # ------------------------------------------------- Google News topical sweeps
  # Google News RSS is the coverage workhorse: free, broad, supports `when:` recency.
  # These are already scoped to AI+finance, so assume_relevant: true.

  - name: GNews AI asset management
    url: "https://news.google.com/rss/search?q=%22asset%20management%22%20(%22artificial%20intelligence%22%20OR%20%22AI%22)%20when:2d&hl=en-US&gl=US&ceid=US:en"
